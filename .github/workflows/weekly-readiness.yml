name: Weekly release readiness

on:
  schedule:
    - cron: "17 21 * * 5"
      timezone: "Asia/Seoul"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weekly-release-readiness
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install exact dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Check public repository contents
        run: npm run repo:check
      - name: Write read-only readiness summary
        run: npm run release:readiness
